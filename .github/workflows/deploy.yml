name: Deploy

on:
  push:
    branches: [main]
    # Keystatic content edits propagate live via the webhook (see DEPLOYMENT.md §15),
    # so a CMS "Save" should not trigger a full rebuild. Image uploads land in
    # public/menu-images/ and DO trigger a rebuild (not excluded here).
    paths-ignore:
      - 'content/**'
      - '**.md'
      - '.vscode/**'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/loukaspiloidis/coffee_three

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_KEYSTATIC_CLOUD_PROJECT=${{ secrets.NEXT_PUBLIC_KEYSTATIC_CLOUD_PROJECT }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/coffee_three
            docker compose pull app migrate
            docker compose up -d
            docker image prune -f
