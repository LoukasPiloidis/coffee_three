services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coffee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coffee}
      POSTGRES_DB: ${POSTGRES_DB:-coffee}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coffee}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      args:
        NEXT_PUBLIC_KEYSTATIC_CLOUD_PROJECT: ${NEXT_PUBLIC_KEYSTATIC_CLOUD_PROJECT:-}
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-coffee}:${POSTGRES_PASSWORD:-coffee}@db:5432/${POSTGRES_DB:-coffee}
    # Run migrations then exit. Script lives alongside the app in the image.
    command: ["node", "scripts/migrate.mjs"]
    restart: "no"

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_KEYSTATIC_CLOUD_PROJECT: ${NEXT_PUBLIC_KEYSTATIC_CLOUD_PROJECT:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-coffee}:${POSTGRES_PASSWORD:-coffee}@db:5432/${POSTGRES_DB:-coffee}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_RESEND_KEY: ${AUTH_RESEND_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      STAFF_EMAIL: ${STAFF_EMAIL}
    expose:
      - "3000"
    # Content is baked into the image; for live Keystatic edits in dev you can mount:
    # volumes:
    #   - ./content:/app/content

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  db-data:
  caddy-data:
  caddy-config:
